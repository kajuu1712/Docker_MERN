version: "3.8"

services: 
  mongo:
    image: mongo
    container_name: mongo
    ports:
    - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: me_admin
      MONGO_INITDB_ROOT_PASSWORD: my_psw_mongo
    volumes:
    - mongo-data:/data/db
    networks:
    - mern

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    ports:
    - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: me_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: my_psw_mongo
      ME_CONFIG_MONGODB_URL: mongodb://me_admin:my_psw_mongo@mongo:27017/
    depends_on:
    - mongo
    networks:
    - mern

  backend:
    build: ./Backend
    container_name: backend
    ports:
    - 3000:3000
    depends_on:
    - mongo
    networks: 
    - mern

  frontend: 
    build: ./Frontend
    container_name: frontend
    ports:
    - 5173:5173
    depends_on:
    - backend
    networks:
    - mern

volumes:
  mongo-data: 
    driver: local
      
networks:
  mern: 
    driver: bridge 
